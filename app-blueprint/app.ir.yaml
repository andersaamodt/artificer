{
  "version": "native-desktop-ir/v1",
  "format": "yaml-1.2-json-compatible",
  "app": {
    "id": "artificer-native",
    "name": "Artificer",
    "targets": ["macos", "linux"],
    "actions": [
      {
        "id": "refresh_runtime",
        "label": "Refresh"
      },
      {
        "id": "add_workspace",
        "label": "Add Workspace"
      },
      {
        "id": "new_session",
        "label": "New Session"
      },
      {
        "id": "queue_prompt",
        "label": "Queue Prompt"
      },
      {
        "id": "attach_file",
        "label": "Attach File"
      },
      {
        "id": "toggle_dictation",
        "label": "Dictate"
      },
      {
        "id": "toggle_codex_work_checks",
        "label": "Codex Work Checks"
      },
      {
        "id": "run_next",
        "label": "Run Next"
      },
      {
        "id": "open_hosted_artificer",
        "label": "Open Hosted Artificer"
      },
      {
        "id": "automation_daemon_enable",
        "label": "Enable Daemon"
      },
      {
        "id": "automation_daemon_pause",
        "label": "Pause Daemon"
      },
      {
        "id": "automation_daemon_resume",
        "label": "Resume Daemon"
      },
      {
        "id": "automation_daemon_tick",
        "label": "Run Daemon Tick"
      },
      {
        "id": "automation_daemon_disable",
        "label": "Disable Daemon"
      },
      {
        "id": "open_settings",
        "label": "Settings"
      }
    ],
    "window": {
      "id": "window.main",
      "name": "mainWindow",
      "type": "Window",
      "title": "Artificer",
      "width": 112,
      "minWidth": 96,
      "height": 72,
      "minHeight": 56,
      "menuBar": {
        "id": "menubar.main",
        "type": "MenuBar",
        "children": [
          {
            "id": "menu.app",
            "type": "Menu",
            "title": "Artificer",
            "children": [
              {
                "id": "menuitem.openSettings",
                "type": "MenuItem",
                "title": "Settings",
                "action": "open_settings",
                "shortcut": "cmd+,"
              },
              {
                "id": "menuitem.quit",
                "type": "MenuItem",
                "title": "Quit",
                "action": "quit_app"
              }
            ]
          },
          {
            "id": "menu.file",
            "type": "Menu",
            "title": "File",
            "children": [
              {
                "id": "menuitem.newSession",
                "type": "MenuItem",
                "title": "New Session",
                "action": "new_session",
                "shortcut": "cmd+n"
              },
              {
                "id": "menuitem.addWorkspace",
                "type": "MenuItem",
                "title": "Add Workspace",
                "action": "add_workspace",
                "shortcut": "cmd+o"
              },
              {
                "id": "menuitem.runNext",
                "type": "MenuItem",
                "title": "Run Next Queue Item",
                "action": "run_next",
                "shortcut": "cmd+return"
              },
              {
                "id": "menuitem.attachFile",
                "type": "MenuItem",
                "title": "Attach File",
                "action": "attach_file"
              },
              {
                "id": "menuitem.openHosted",
                "type": "MenuItem",
                "title": "Open Hosted Artificer",
                "action": "open_hosted_artificer"
              }
            ]
          },
          {
            "id": "menu.automation",
            "type": "Menu",
            "title": "Automation",
            "children": [
              {
                "id": "menuitem.daemonEnable",
                "type": "MenuItem",
                "title": "Enable Daemon",
                "action": "automation_daemon_enable"
              },
              {
                "id": "menuitem.daemonPause",
                "type": "MenuItem",
                "title": "Pause Daemon",
                "action": "automation_daemon_pause"
              },
              {
                "id": "menuitem.daemonResume",
                "type": "MenuItem",
                "title": "Resume Daemon",
                "action": "automation_daemon_resume"
              },
              {
                "id": "menuitem.daemonTick",
                "type": "MenuItem",
                "title": "Run Tick Now",
                "action": "automation_daemon_tick"
              },
              {
                "id": "menuitem.daemonDisable",
                "type": "MenuItem",
                "title": "Disable Daemon",
                "action": "automation_daemon_disable"
              }
            ]
          }
        ]
      },
      "toolbar": {
        "id": "toolbar.main",
        "type": "Toolbar",
        "children": [
          {
            "id": "toolbar.button.refresh",
            "type": "Button",
            "title": "Refresh",
            "action": "refresh_runtime"
          },
          {
            "id": "toolbar.button.newSession",
            "type": "Button",
            "title": "New Session",
            "action": "new_session"
          },
          {
            "id": "toolbar.button.dictate",
            "type": "Button",
            "title": "Dictate",
            "action": "toggle_dictation"
          },
          {
            "id": "toolbar.spacer.1",
            "type": "Spacer"
          },
          {
            "id": "toolbar.button.settings",
            "type": "Button",
            "title": "Settings",
            "action": "open_settings"
          }
        ]
      },
      "content": {
        "id": "content.main",
        "type": "Content",
        "child": {
          "id": "stack.root",
          "type": "Stack",
          "axis": "vertical",
          "spacing": 16,
          "children": [
            {
              "id": "section.hero",
              "type": "Section",
              "title": "Overview",
              "child": {
                "id": "stack.hero",
                "type": "Stack",
                "axis": "vertical",
                "spacing": 12,
                "children": [
                  {
                    "id": "text.headline",
                    "type": "Text",
                    "style": "title",
                    "value": "Artificer"
                  },
                  {
                    "id": "text.summary",
                    "type": "Text",
                    "style": "body",
                    "value": "Platform-native Artificer console backed by the existing local runtime."
                  }
                ]
              }
            }
          ]
        }
      },
      "statusBar": {
        "id": "statusbar.main",
        "type": "StatusBar",
        "children": [
          {
            "id": "statusbar.text",
            "type": "Text",
            "style": "caption",
            "value": "Ready"
          }
        ]
      }
    }
  },
  "extensions": []
}
